version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: leaguemate-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: leaguemate_db
      MYSQL_USER: leaguemate_user
      MYSQL_PASSWORD: leaguemate_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - leaguemate-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: leaguemate-api
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/leaguemate_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=leaguemate_user
      - SPRING_DATASOURCE_PASSWORD=leaguemate_pass
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - JWT_SECRET=bXlTdXBlclNlY3JldEtleUZvckxlYWd1ZU1hdGVBUElTZWN1cml0eTIwMjY=
      - JWT_EXPIRATION=86400000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - leaguemate-network

volumes:
  mysql_data:

networks:
  leaguemate-network:
    driver: bridge